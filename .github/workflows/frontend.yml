name: frontend CI

# Mirrors the local verification we run for every sprint:
#   npx tsc --noEmit   →  0 errors
#   npm run build       →  Vite production build, gzip budget honored
# A failure here means a regression that would have shipped without CI.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install (npm ci — uses lockfile)
        run: npm ci

      - name: ESLint (0 warnings allowed)
        # The lint baseline is the team contract — the local dev box runs
        # this offline against the cached package set, but CI always has
        # the registry available so npm ci pulls a clean lockfile install.
        run: npm run lint -- --max-warnings 0

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
